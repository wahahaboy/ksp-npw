<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>ฐานข้อมูลใบประกอบวิชาชีพ</title>

  <!-- ===== iOS: Add to Home Screen ===== -->
  <!-- ทำให้เปิดแบบเต็มจอ ไม่มีแถบที่อยู่/แถบเครื่องมือของ Safari -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <!-- สีแถบสถานะด้านบน (black-translucent = โปร่งแสงกลืนกับพื้นหลังเว็บ) -->
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <!-- ชื่อที่จะแสดงใต้ไอคอนบนหน้าจอโฮม -->
  <meta name="apple-mobile-web-app-title" content="KSP-NPW">
  <!-- ไอคอนแอป (ควรเป็นรูปสี่เหลี่ยมจัตุรัส อย่างน้อย 180x180px) -->
  <link rel="apple-touch-icon" href="https://lh3.googleusercontent.com/d/1t11rE_qx2D8Q8qisLd1T_xOPHPOHGWHp">
  <!-- สีธีม (เผื่อเปิดบน Android/Chrome ด้วย) -->
  <meta name="theme-color" content="#125B64">

  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      overflow: hidden;
    }
    iframe {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      border: none;
    }
  </style>
</head>
<body>
  <iframe
    src="https://script.google.com/macros/s/AKfycbxwvTelTKtHDpY4PNqKZDktyFO25M4HILnMgVwmDLM_DcvXhY70b4cv9XCR7TsbfzmY/exec"
    title="ฐานข้อมูลใบประกอบวิชาชีพ"
    allow="clipboard-write"
  ></iframe>
</body>
</html>
